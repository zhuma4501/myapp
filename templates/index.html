<!DOCTYPE html>
<html>
<head>
    <title>My Flask App</title>
</head>
<body>
    <h1>Добавить пользователя</h1>

    <form method="POST">
        <input type="text" name="name" placeholder="Введите имя" required>
        <button type="submit">Добавить</button>
    </form>

    <h2>Список пользователей:</h2>
    <ul>
        {% for user in users %}
            <li>{{ user[1] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
